<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeMusic - Моя Коллекция</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ======= ЦВЕТОВАЯ ПАЛИТРА И БАЗА ======= */
        :root {
            --bg-dark: #121212;
            --side-panel: #000000;
            --card-bg: #181818;
            --accent: #1db954; /* Фирменный зеленый */
            --text-white: #ffffff;
            --text-gray: #b3b3b3;
            --hover-color: #282828;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ======= БОКОВАЯ ПАНЕЛЬ (ПК) / ВЕРХНЯЯ (МОБ) ======= */
        .sidebar {
            width: 240px;
            background-color: var(--side-panel);
            padding: 24px 15px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex-shrink: 0;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 10px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-gray);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
            margin-bottom: 5px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-white);
            background-color: var(--hover-color);
        }

        /* ======= ОСНОВНОЙ КОНТЕНТ ======= */
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #222222, var(--bg-dark));
            overflow-y: auto;
            position: relative;
        }

        .top-bar {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 350px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border-radius: 20px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #333;
        }

        .content-padding {
            padding: 20px 30px 120px 30px;
        }

        .category-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 20px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }

        .cat-btn.active {
            background: white;
            color: black;
        }

        /* ======= СЕТКА МУЗЫКИ ======= */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        .music-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
        }

        .music-card:hover {
            background: var(--hover-color);
        }

        .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            margin-bottom: 12px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 45px;
            height: 45px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
        }

        .music-card:hover .play-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .card-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-artist {
            color: var(--text-gray);
            font-size: 13px;
        }

        .like-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: 0.2s;
        }

        .like-btn.active { color: var(--accent); }

        /* ======= НИЖНИЙ ПЛЕЕР ======= */
        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 95px;
            background: #000;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .track-info { display: flex; align-items: center; width: 30%; gap: 15px; }
        .current-img { width: 55px; height: 55px; border-radius: 4px; object-fit: cover; }
        .current-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .current-artist { font-size: 12px; color: var(--text-gray); }

        .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .main-controls { display: flex; align-items: center; gap: 25px; }
        
        .c-btn { background: none; border: none; color: var(--text-gray); font-size: 20px; cursor: pointer; }
        .c-btn:hover { color: white; }
        .play-trigger { background: white; color: black; width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; }

        .progress-block { width: 100%; max-width: 500px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-gray); }
        .seek-bar { flex: 1; height: 4px; background: #444; border-radius: 2px; position: relative; cursor: pointer; }
        .fill-bar { height: 100%; background: white; border-radius: 2px; width: 0%; }

        .player-right { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        .vol-slider { width: 100px; accent-color: var(--accent); cursor: pointer; }

        /* ======= МОБИЛЬНАЯ АДАПТАЦИЯ ======= */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%;
                padding: 10px 15px;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                gap: 0;
            }
            .nav-menu { display: flex; gap: 5px; }
            .nav-item { margin-bottom: 0; padding: 8px 12px; font-size: 13px; }
            .nav-item span { display: none; } /* Оставляем только иконки */
            
            .top-bar { padding: 15px; }
            .content-padding { padding: 15px 15px 110px 15px; }
            .music-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            
            .player-right { display: none; } /* Скрываем звук на мобилках */
            .track-info { width: 60%; }
            .player-center { width: 40%; flex: none; }
            .progress-block { display: none; } /* Скрываем полоску времени на мобилках для простоты */
            .main-controls { gap: 15px; }
            .play-overlay { opacity: 1; transform: none; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo"><i class="fa-solid fa-compact-disc"></i> <span>VibeMusic</span></div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="changeTab('home', this)"><i class="fa-solid fa-house"></i> <span>Главная</span></li>
            <li class="nav-item" onclick="changeTab('liked', this)"><i class="fa-solid fa-heart"></i> <span>Избранное</span></li>
        </ul>
    </nav>

    <main class="main-view">
        <div class="top-bar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Поиск музыки...">
            </div>
        </div>

        <div class="content-padding">
            <div class="category-scroll" id="catList"></div>
            <h2 id="viewTitle" style="margin-bottom: 20px;">Новинки для вас</h2>
            <div class="music-grid" id="musicGrid"></div>
        </div>
    </main>

    <div class="player-bar">
        <div class="track-info">
            <img src="" id="currImg" class="current-img" style="display: none;">
            <div>
                <div class="current-title" id="currTitle">Выберите трек</div>
                <div class="current-artist" id="currArtist">Музыка ждет</div>
            </div>
        </div>

        <div class="player-center">
            <div class="main-controls">
                <button class="c-btn" onclick="prev()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="c-btn play-trigger" id="masterPlay" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                <button class="c-btn" onclick="next()"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="progress-block">
                <span id="timeCurr">0:00</span>
                <div class="seek-bar" onclick="seek(event)">
                    <div class="fill-bar" id="fillBar"></div>
                </div>
                <span id="timeTotal">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <i class="fa-solid fa-volume-low" style="color: gray"></i>
            <input type="range" class="vol-slider" min="0" max="1" step="0.05" value="0.7" oninput="setVol(this.value)">
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        /* ======= ВАША МУЗЫКА (ЛЕГКО ИЗМЕНЯТЬ ТУТ) ======= */
        const DATABASE = [
            { id: 1, title: "Summer Vibes", artist: "Chill Master", cat: "Chill", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", img: "https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=400" },
            { id: 2, title: "Electric Night", artist: "Cyber Guy", cat: "Electronic", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", img: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400" },
            { id: 3, title: "Rock Anthem", artist: "The Band", cat: "Rock", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", img: "https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?w=400" },
            { id: 4, title: "Morning Jazz", artist: "Smooth Sax", cat: "Jazz", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", img: "https://images.unsplash.com/photo-1511192336575-5a79af67a629?w=400" },
            { id: 5, title: "Deep Space", artist: "Ambient Pro", cat: "Chill", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", img: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=400" },
            { id: 6, title: "Urban Beat", artist: "Street DJ", cat: "Hip-Hop", file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3", img: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400" }
        ];

        let likedIds = JSON.parse(localStorage.getItem('vibeLiked')) || [];
        let currentQueue = [...DATABASE];
        let playingIdx = -1;
        let currentView = 'home'; // 'home' или 'liked'
        
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('masterPlay');

        // Загрузка
        window.onload = () => {
            renderCats();
            renderMusic(DATABASE);
        };

        function renderCats() {
            const cats = ["Все", ...new Set(DATABASE.map(m => m.cat))];
            const container = document.getElementById('catList');
            container.innerHTML = cats.map(c => `<button class="cat-btn ${c==='Все'?'active':''}" onclick="filterByCat('${c}', this)">${c}</button>`).join('');
        }

        function renderMusic(list) {
            const grid = document.getElementById('musicGrid');
            grid.innerHTML = '';
            
            if(list.length === 0) {
                grid.innerHTML = '<p style="color: gray; grid-column: 1/-1; text-align: center; margin-top: 50px;">Здесь пока пусто...</p>';
                return;
            }

            list.forEach((track, index) => {
                const isLiked = likedIds.includes(track.id);
                const card = document.createElement('div');
                card.className = 'music-card';
                card.innerHTML = `
                    <button class="like-btn ${isLiked?'active':''}" onclick="toggleLike(event, ${track.id})">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                    <div class="img-container" onclick="startPlay(${index}, 'list')">
                        <img src="${track.img}">
                        <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
                    </div>
                    <div class="card-title">${track.title}</div>
                    <div class="card-artist">${track.artist}</div>
                `;
                grid.appendChild(card);
            });
            currentQueue = list;
        }

        // Логика вкладок
        function changeTab(tab, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            currentView = tab;
            
            if(tab === 'liked') {
                document.getElementById('viewTitle').innerText = "Ваше избранное";
                renderMusic(DATABASE.filter(m => likedIds.includes(m.id)));
            } else {
                document.getElementById('viewTitle').innerText = "Новинки для вас";
                renderMusic(DATABASE);
            }
        }

        // Поиск и фильтры
        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const source = currentView === 'liked' ? DATABASE.filter(m => likedIds.includes(m.id)) : DATABASE;
            const filtered = source.filter(m => m.title.toLowerCase().includes(val) || m.artist.toLowerCase().includes(val));
            renderMusic(filtered);
        };

        function filterByCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const source = currentView === 'liked' ? DATABASE.filter(m => likedIds.includes(m.id)) : DATABASE;
            const filtered = cat === "Все" ? source : source.filter(m => m.cat === cat);
            renderMusic(filtered);
        }

        // Избранное
        function toggleLike(e, id) {
            e.stopPropagation();
            if(likedIds.includes(id)) {
                likedIds = likedIds.filter(i => i !== id);
            } else {
                likedIds.push(id);
            }
            localStorage.setItem('vibeLiked', JSON.stringify(likedIds));
            
            // Если мы во вкладке избранного, сразу обновляем список
            if(currentView === 'liked') {
                renderMusic(DATABASE.filter(m => likedIds.includes(m.id)));
            } else {
                e.currentTarget.classList.toggle('active');
            }
        }

        // Управление плеером
        function startPlay(idx) {
            playingIdx = idx;
            const track = currentQueue[idx];
            
            audio.src = track.file;
            audio.play();
            
            document.getElementById('currImg').src = track.img;
            document.getElementById('currImg').style.display = 'block';
            document.getElementById('currTitle').innerText = track.title;
            document.getElementById('currArtist').innerText = track.artist;
            
            playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        }

        function togglePlay() {
            if(playingIdx === -1) return startPlay(0);
            if(audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        }

        function next() {
            let nextIdx = playingIdx + 1;
            if(nextIdx >= currentQueue.length) nextIdx = 0;
            startPlay(nextIdx);
        }

        function prev() {
            let prevIdx = playingIdx - 1;
            if(prevIdx < 0) prevIdx = currentQueue.length - 1;
            startPlay(prevIdx);
        }

        // Прогресс и громкость
        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100;
            document.getElementById('fillBar').style.width = perc + '%';
            document.getElementById('timeCurr').innerText = formatTime(audio.currentTime);
            document.getElementById('timeTotal').innerText = formatTime(audio.duration);
        };

        audio.onended = () => next();

        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const perc = x / rect.width;
            audio.currentTime = perc * audio.duration;
        }

        function setVol(v) { audio.volume = v; }

        function formatTime(sec) {
            if(!sec) return "0:00";
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    </script>
</body>
    </html>
