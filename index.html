<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Музыка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #121212;
            --sidebar-bg: #000000;
            --player-bg: #181818;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --accent-color: #1db954;
            --hover-bg: #282828;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background-color: var(--sidebar-bg);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-menu li {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-menu li i {
            font-size: 20px;
        }

        .nav-menu li:hover, .nav-menu li.active {
            color: var(--text-main);
        }

        .nav-menu li.active {
            background-color: var(--hover-bg);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #2a2a2a 0%, var(--bg-color) 100%);
            padding: 20px 30px;
            overflow-y: auto;
            margin-bottom: 90px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 350px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 40px;
            border-radius: 20px;
            border: none;
            background-color: white;
            color: black;
            font-size: 14px;
            outline: none;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #000;
        }

        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .category-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .category-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .category-btn.active {
            background-color: white;
            color: black;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        .song-card {
            background-color: var(--player-bg);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
            position: relative;
        }

        .song-card:hover {
            background-color: var(--hover-bg);
        }

        .song-cover-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            margin-bottom: 16px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .song-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-btn-overlay {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 48px;
            height: 48px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-size: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 8px rgba(0,0,0,0.3);
        }

        .song-card:hover .play-btn-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .song-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .add-to-playlist-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
            z-index: 2;
        }

        .song-card:hover .add-to-playlist-btn {
            opacity: 1;
        }

        .add-to-playlist-btn:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }
        
        .add-to-playlist-btn.in-playlist {
            opacity: 1;
            color: var(--accent-color);
        }

        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background-color: var(--player-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
        }

        .player-info {
            display: flex;
            align-items: center;
            width: 30%;
            gap: 14px;
        }

        .player-cover {
            width: 56px;
            height: 56px;
            border-radius: 4px;
            object-fit: cover;
            background-color: #333;
        }

        .player-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .player-title {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .player-artist {
            font-size: 12px;
            color: var(--text-muted);
        }

        .player-controls-container {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .control-btn:hover {
            color: white;
        }

        .play-pause-btn {
            width: 32px;
            height: 32px;
            background-color: white;
            color: black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        .play-pause-btn:hover {
            transform: scale(1.05);
            color: black;
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-bar-wrapper {
            flex: 1;
            height: 4px;
            background-color: #4f4f4f;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar-wrapper:hover .progress-bar {
            background-color: var(--accent-color);
        }

        .progress-bar {
            height: 100%;
            background-color: white;
            border-radius: 2px;
            width: 0%;
        }

        .player-actions {
            width: 30%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
        }
        
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100px;
        }
        
        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #4f4f4f;
            outline: none;
            cursor: pointer;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        .empty-state {
            width: 100%;
            text-align: center;
            color: var(--text-muted);
            margin-top: 50px;
            font-size: 18px;
            grid-column: 1 / -1;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #888;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-headphones"></i> VibeMusic
        </div>
        <ul class="nav-menu">
            <li class="active" onclick="switchTab('home')"><i class="fa-solid fa-house"></i> Главная</li>
            <li onclick="switchTab('playlist')"><i class="fa-solid fa-heart"></i> Мой плейлист</li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Поиск треков или артистов...">
            </div>
            <div class="categories" id="categoriesContainer">
            </div>
        </header>

        <h2 class="section-title" id="sectionTitle">Рекомендации</h2>
        <div class="songs-grid" id="songsGrid">
        </div>
    </main>

    <div class="player-bar">
        <div class="player-info">
            <img src="" alt="Cover" class="player-cover" id="playerCover" style="display: none;">
            <div class="player-text">
                <div class="player-title" id="playerTitle">Трек не выбран</div>
                <div class="player-artist" id="playerArtist">Выберите песню для воспроизведения</div>
            </div>
        </div>

        <div class="player-controls-container">
            <div class="player-controls">
                <button class="control-btn" onclick="playPrev()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="control-btn play-pause-btn" id="playPauseBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                <button class="control-btn" onclick="playNext()"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar-wrapper" id="progressWrapper" onclick="seekTrack(event)">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="player-actions">
            <div class="volume-container">
                <i class="fa-solid fa-volume-low" style="color: var(--text-muted); font-size: 14px;"></i>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const ALL_MUSIC = [
            {
                id: 1,
                title: "Energy Rock",
                artist: "Группа 1",
                category: "Рок",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                cover: "https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
            },
            {
                id: 2,
                title: "Chillout Beats",
                artist: "DJ Relax",
                category: "Электроника",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
            },
            {
                id: 3,
                title: "Summer Pop Hits",
                artist: "Поп Звезда",
                category: "Поп",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                cover: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
            },
            {
                id: 4,
                title: "Acoustic Vibes",
                artist: "Гитарист",
                category: "Инди",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                cover: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
            },
            {
                id: 5,
                title: "Synthwave Run",
                artist: "Retro Boy",
                category: "Электроника",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                cover: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
            },
            {
                id: 6,
                title: "Classic Rock Anthem",
                artist: "Легенды",
                category: "Рок",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                cover: "https://images.unsplash.com/photo-1459749411175-04bf5292ceea?ixlib=rb-1.2.1&auto=format&fit=crop&w=300&q=80"
            }
        ];

        let myPlaylist = JSON.parse(localStorage.getItem('vibeMusicPlaylist')) || []; 
        let currentQueue = [...ALL_MUSIC]; 
        let currentTrackIndex = -1; 
        let activeCategory = "Все";
        let currentTab = "home"; 

        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const searchInput = document.getElementById('searchInput');
        const songsGrid = document.getElementById('songsGrid');
        const sectionTitle = document.getElementById('sectionTitle');
        const categoriesContainer = document.getElementById('categoriesContainer');

        function init() {
            renderCategories();
            renderSongs(ALL_MUSIC);
            audioPlayer.volume = 0.5; 
        }

        function renderCategories() {
            const categories = ["Все", ...new Set(ALL_MUSIC.map(song => song.category))];
            categoriesContainer.innerHTML = '';
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${activeCategory === cat ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => filterByCategory(cat);
                categoriesContainer.appendChild(btn);
            });
        }

        function renderSongs(songsToRender) {
            songsGrid.innerHTML = '';
            currentQueue = songsToRender; 
            
            if (songsToRender.length === 0) {
                songsGrid.innerHTML = `<div class="empty-state">Ничего не найдено 😔</div>`;
                return;
            }

            songsToRender.forEach((song, index) => {
                const isInPlaylist = myPlaylist.includes(song.id);
                
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <div class="song-cover-container" onclick="playTrack(${index})">
                        <img src="${song.cover}" alt="cover" class="song-cover">
                        <div class="play-btn-overlay">
                            <i class="fa-solid fa-play"></i>
                        </div>
                    </div>
                    <button class="add-to-playlist-btn ${isInPlaylist ? 'in-playlist' : ''}" 
                            onclick="togglePlaylist(event, ${song.id})" 
                            title="${isInPlaylist ? 'Удалить из плейлиста' : 'Добавить в плейлист'}">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                    <div class="song-title">${song.title}</div>
                    <div class="song-artist">${song.artist}</div>
                `;
                songsGrid.appendChild(card);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const navItems = document.querySelectorAll('.nav-menu li');
            navItems.forEach(item => item.classList.remove('active'));
            
            if (tab === 'home') {
                navItems[0].classList.add('active');
                sectionTitle.innerText = "Рекомендации";
                searchInput.value = '';
                filterByCategory("Все");
            } else if (tab === 'playlist') {
                navItems[1].classList.add('active');
                sectionTitle.innerText = "Мой плейлист";
                const playlistSongs = ALL_MUSIC.filter(song => myPlaylist.includes(song.id));
                renderSongs(playlistSongs);
                // Скрываем категории в плейлисте
                categoriesContainer.style.display = 'none';
            }
        }

        function filterByCategory(category) {
            activeCategory = category;
            categoriesContainer.style.display = 'flex'; // Возвращаем категории
            renderCategories(); // Перерисовываем активную кнопку
            
            let filtered = ALL_MUSIC;
            if (category !== "Все") {
                filtered = ALL_MUSIC.filter(song => song.category === category);
            }
            renderSongs(filtered);
        }

        // Поиск (работает при вводе текста)
        searchInput.addEventListener('input', (e) => {
            if (currentTab === 'playlist') switchTab('home'); // Сбрасываем на главную при поиске
            
            const query = e.target.value.toLowerCase();
            const searched = ALL_MUSIC.filter(song => 
                song.title.toLowerCase().includes(query) || 
                song.artist.toLowerCase().includes(query)
            );
            sectionTitle.innerText = query ? "Результаты поиска" : "Рекомендации";
            renderSongs(searched);
        });

        /* ======= ЛОГИКА ПЛЕЙЛИСТА ======= */
        
        function togglePlaylist(event, songId) {
            event.stopPropagation(); // Чтобы не запускалось воспроизведение при клике на сердечко
            const index = myPlaylist.indexOf(songId);
            const btn = event.currentTarget;
            
            if (index > -1) {
                // Удаляем
                myPlaylist.splice(index, 1);
                btn.classList.remove('in-playlist');
                if (currentTab === 'playlist') {
                    // Перерисовываем, если мы находимся во вкладке плейлиста
                    switchTab('playlist');
                }
            } else {
                // Добавляем
                myPlaylist.push(songId);
                btn.classList.add('in-playlist');
            }
            // Сохраняем в localStorage
            localStorage.setItem('vibeMusicPlaylist', JSON.stringify(myPlaylist));
        }

        /* ======= ЛОГИКА АУДИОПЛЕЕРА ======= */

        function playTrack(index) {
            if(index < 0 || index >= currentQueue.length) return;
            
            currentTrackIndex = index;
            const song = currentQueue[index];
            
            audioPlayer.src = song.src;
            audioPlayer.play();
            
            // Обновляем UI плеера
            document.getElementById('playerCover').src = song.cover;
            document.getElementById('playerCover').style.display = 'block';
            document.getElementById('playerTitle').innerText = song.title;
            document.getElementById('playerArtist').innerText = song.artist;
            
            updatePlayPauseIcon(true);
        }

        function togglePlay() {
            if (currentTrackIndex === -1 && currentQueue.length > 0) {
                playTrack(0);
                return;
            }

            if (audioPlayer.paused) {
                audioPlayer.play();
                updatePlayPauseIcon(true);
            } else {
                audioPlayer.pause();
                updatePlayPauseIcon(false);
            }
        }

        function playNext() {
            if(currentQueue.length === 0) return;
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= currentQueue.length) nextIndex = 0; 
            playTrack(nextIndex);
        }

        function playPrev() {
            if(currentQueue.length === 0) return;
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = currentQueue.length - 1; 
            playTrack(prevIndex);
        }

        function updatePlayPauseIcon(isPlaying) {
            if (isPlaying) {
                playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        }

        function changeVolume(val) {
            audioPlayer.volume = val;
        }

        /* ======= ПРОГРЕСС БАР И ВРЕМЯ ======= */

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            
            if (duration) {
                const progressPercent = (current / duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                currentTimeEl.innerText = formatTime(current);
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            totalTimeEl.innerText = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('ended', playNext);

        function seekTrack(e) {
            const wrapper = document.getElementById('progressWrapper');
            const width = wrapper.clientWidth;
            const clickX = e.offsetX;
            const duration = audioPlayer.duration;
            
            if (duration) {
                audioPlayer.currentTime = (clickX / width) * duration;
            }
        }

        // Запуск инициализации
        init();
    </script>
</body>
</html>
